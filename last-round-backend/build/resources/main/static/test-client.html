<!-- file: last-round-backend/src/main/resources/static/test-client.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Round Backend Test Client</title>
  <style>
    :root {
      --bg: #0b132b;
      --panel: #1c2541;
      --panel-2: #273a63;
      --text: #f5f7ff;
      --muted: #bfd1ff;
      --ok: #3ddc97;
      --bad: #ff7b7b;
      --accent: #5bc0be;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 20% 10%, #1f3f68 0%, var(--bg) 42%, #050811 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      letter-spacing: 0.3px;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: var(--accent);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      background: var(--accent);
      color: #062324;
      cursor: pointer;
    }

    button.secondary {
      background: #87a5ff;
      color: #101f4c;
    }

    .token-box {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px;
      border-radius: 8px;
      word-break: break-all;
      font-size: 12px;
      max-height: 100px;
      overflow: auto;
    }

    .status {
      margin: 12px 0;
      font-size: 14px;
      color: var(--muted);
    }

    .status .ok { color: var(--ok); }
    .status .bad { color: var(--bad); }

    .log {
      margin-top: 16px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #d6e6ff;
      font-size: 12px;
      line-height: 1.4;
      max-height: 320px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>Last Round Backend Test Client</h1>
  <div class="status" id="status">서버: <span id="serverStatus">확인 전</span></div>

  <div class="layout">
    <section class="card">
      <h2>환경 설정</h2>
      <label for="baseUrl">Base URL</label>
      <input id="baseUrl" value="http://localhost:8080" />
      <div class="row" style="margin-top:10px;">
        <button id="pingBtn">서버 확인</button>
        <button class="secondary" id="clearLogBtn">로그 초기화</button>
      </div>
    </section>

    <section class="card">
      <h2>Auth</h2>
      <label for="email">Email</label>
      <input id="email" type="email" value="player1@test.com" />
      <label for="password">Password</label>
      <input id="password" type="password" value="password123" />
      <label for="nickname">Nickname (Signup)</label>
      <input id="nickname" value="player1" />
      <div class="row" style="margin-top:10px;">
        <button id="signupBtn">Signup</button>
        <button id="loginBtn">Login</button>
        <button class="secondary" id="refreshBtn">Refresh</button>
      </div>
      <label>Access Token</label>
      <div id="accessTokenBox" class="token-box">(없음)</div>
    </section>

    <section class="card">
      <h2>User</h2>
      <label for="newNickname">새 닉네임</label>
      <input id="newNickname" value="player1_new" />
      <div class="row" style="margin-top:10px;">
        <button id="meBtn">GET /api/user/me</button>
        <button id="updateUserBtn">PUT /api/user/update</button>
      </div>
    </section>

    <section class="card">
      <h2>Match</h2>
      <label for="player1Id">player1Id</label>
      <input id="player1Id" type="number" value="1" />
      <label for="player2Id">player2Id</label>
      <input id="player2Id" type="number" value="2" />
      <label for="winnerId">winnerId</label>
      <input id="winnerId" type="number" value="1" />
      <div class="row">
        <div style="flex:1;">
          <label for="player1Score">player1Score</label>
          <input id="player1Score" type="number" value="3" />
        </div>
        <div style="flex:1;">
          <label for="player2Score">player2Score</label>
          <input id="player2Score" type="number" value="1" />
        </div>
      </div>
      <div class="row">
        <div style="flex:1;">
          <label for="historyPage">history page</label>
          <input id="historyPage" type="number" value="0" />
        </div>
        <div style="flex:1;">
          <label for="historySize">history size</label>
          <input id="historySize" type="number" value="20" />
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="matchResultBtn">POST /api/match/result</button>
        <button id="matchHistoryBtn">GET /api/match/history</button>
      </div>
    </section>

    <section class="card">
      <h2>Public APIs</h2>
      <div class="row">
        <button id="leaderboardBtn">GET /api/leaderboard</button>
        <button id="augmentsBtn">GET /api/augments</button>
      </div>
    </section>
  </div>

  <section class="log">
    <pre id="log">Ready.</pre>
  </section>

  <script>
    let accessToken = localStorage.getItem('lr_access_token') || '';

    const el = (id) => document.getElementById(id);

    const logEl = el('log');
    const serverStatusEl = el('serverStatus');
    const accessTokenBox = el('accessTokenBox');

    function setToken(token) {
      accessToken = token || '';
      localStorage.setItem('lr_access_token', accessToken);
      accessTokenBox.textContent = accessToken || '(없음)';
    }

    function appendLog(title, payload) {
      const time = new Date().toLocaleTimeString();
      const text = `[${time}] ${title}\n${typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2)}\n\n`;
      logEl.textContent = text + logEl.textContent;
    }

    function getBaseUrl() {
      return el('baseUrl').value.trim().replace(/\/$/, '');
    }

    async function api(path, method = 'GET', body = null, auth = false) {
      const headers = { 'Content-Type': 'application/json' };
      if (auth && accessToken) headers.Authorization = `Bearer ${accessToken}`;

      const res = await fetch(`${getBaseUrl()}${path}`, {
        method,
        headers,
        credentials: 'include',
        body: body ? JSON.stringify(body) : null
      });

      let json;
      try {
        json = await res.json();
      } catch {
        json = { raw: await res.text() };
      }

      appendLog(`${method} ${path} [${res.status}]`, json);
      return { ok: res.ok, status: res.status, data: json };
    }

    async function pingServer() {
      try {
        const r = await api('/api/augments');
        serverStatusEl.innerHTML = r.ok
          ? '<span class="ok">연결됨</span>'
          : '<span class="bad">응답 오류</span>';
      } catch (e) {
        serverStatusEl.innerHTML = '<span class="bad">연결 실패</span>';
        appendLog('PING ERROR', String(e));
      }
    }

    el('pingBtn').addEventListener('click', pingServer);
    el('clearLogBtn').addEventListener('click', () => { logEl.textContent = 'Ready.'; });

    el('signupBtn').addEventListener('click', async () => {
      const r = await api('/api/auth/signup', 'POST', {
        email: el('email').value.trim(),
        password: el('password').value,
        nickname: el('nickname').value.trim()
      });
      if (r.data?.success && r.data?.data?.accessToken) setToken(r.data.data.accessToken);
    });

    el('loginBtn').addEventListener('click', async () => {
      const r = await api('/api/auth/login', 'POST', {
        email: el('email').value.trim(),
        password: el('password').value
      });
      if (r.data?.success && r.data?.data?.accessToken) setToken(r.data.data.accessToken);
    });

    el('refreshBtn').addEventListener('click', async () => {
      const r = await api('/api/auth/refresh', 'POST', {});
      if (r.data?.success && r.data?.data?.accessToken) setToken(r.data.data.accessToken);
    });

    el('meBtn').addEventListener('click', async () => {
      await api('/api/user/me', 'GET', null, true);
    });

    el('updateUserBtn').addEventListener('click', async () => {
      await api('/api/user/update', 'PUT', {
        nickname: el('newNickname').value.trim()
      }, true);
    });

    el('matchResultBtn').addEventListener('click', async () => {
      await api('/api/match/result', 'POST', {
        player1Id: Number(el('player1Id').value),
        player2Id: Number(el('player2Id').value),
        winnerId: Number(el('winnerId').value),
        player1Score: Number(el('player1Score').value),
        player2Score: Number(el('player2Score').value)
      }, true);
    });

    el('matchHistoryBtn').addEventListener('click', async () => {
      const page = Number(el('historyPage').value);
      const size = Number(el('historySize').value);
      await api(`/api/match/history?page=${page}&size=${size}`, 'GET', null, true);
    });

    el('leaderboardBtn').addEventListener('click', async () => {
      await api('/api/leaderboard', 'GET');
    });

    el('augmentsBtn').addEventListener('click', async () => {
      await api('/api/augments', 'GET');
    });

    setToken(accessToken);
    pingServer();
  </script>
</body>
</html>
