# file: last-round-backend/src/main/resources/application.yml
spring:
  datasource:
    url: jdbc:h2:file:./data/last_round;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

jwt:
  secret: 9f4e36f8bb7340d6922f0439b8a1d23ce2db9dc8328dcf6cbecf2e3f18a1d1f6
  access-token-expiration-minutes: 15
  refresh-token-expiration-days: 14
  refresh-cookie-name: refresh_token
